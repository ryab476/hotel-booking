<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>MiniApp — тест</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 16px; }
    button { padding: 10px 14px; font-size: 16px; }
    #status { margin-top: 12px; color: #333; }
  </style>
</head>
<body>
  <h2>Мини-приложение тест</h2>

  <p>Это упрощённый пример: нажмите кнопку, чтобы отправить данные боту.</p>

  <button id="sendBtn">Отправить ping</button>
  <div id="status"></div>

  <script>
    // Проверяем, запущено ли в Telegram
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

    const statusEl = document.getElementById("status");
    function setStatus(s){
      statusEl.innerText = s;
    }

    if (!tg) {
      // не внутри Telegram WebApp
      alert("⚠️ Откройте это приложение через Telegram (кнопку бота). В браузере sendData не сработает.");
      setStatus("Открыто вне Telegram — данные не будут отправлены.");
    } else {
      console.log("initData:", tg.initData);
      tg.ready();
      try { tg.expand(); } catch (e) { /*ignore*/ }

      const sendBtn = document.getElementById("sendBtn");

      sendBtn.addEventListener("click", async () => {
        const data = {
          ping: "pong",
          // пример дополнительных полей
          // hotel: "Альфа",
          // category: "Стандарт",
          // firstName: "Иван",
          // lastName: "Иванов",
        };

        setStatus("Отправка данных...");
        console.log("👉 Отправка данных в Telegram:", data);

        try {
          // sendData доступен только внутри Telegram WebApp
          if (typeof tg.sendData === "function") {
            tg.sendData(JSON.stringify(data)); // отправляем в бота
            setStatus("Данные отправлены. Mini App будет закрыт.");
            // небольшая задержка, чтобы дать время отправке
            setTimeout(() => {
              try { tg.close(); } catch (e) { console.error(e); }
            }, 300);
          } else {
            setStatus("Ошибка: tg.sendData недоступен в этом клиенте.");
            console.error("tg.sendData is not a function");
          }
        } catch (err) {
          console.error("Ошибка при отправке данных:", err);
          setStatus("Ошибка при отправке данных: " + err.toString());
        }
      });

      // Если приложение открыто не через кнопку бота (например прямой URL),
      // то initData может быть пустым — предупреждаем пользователя.
      if (!tg.initData || tg.initData === "") {
        // только информируем, не прерываем
        console.warn("Warning: initData is empty (app probably opened not from bot). sendData всё равно может работать, но предпочтительнее открывать из бота.");
        // показываем это в статусе на UI
        setStatus("Внимание: приложение возможно открыто не из Telegram-кнопки бота. Проверьте, открывается ли через бота.");
      }
    }
  </script>
</body>
</html>
