<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <h2>Мини-приложение тест</h2>
  <button id="sendBtn">Отправить ping</button>

  <script>
    const tg = window.Telegram.WebApp;

    console.log("initData:", tg.initData);
    tg.ready();
    tg.expand();

    document.getElementById("sendBtn").addEventListener("click", () => {
      const data = { ping: "pong" };
      console.log("👉 Отправка данных в Telegram:", data);

      tg.sendData(JSON.stringify(data)); // отправляем в бота
      tg.close(); // закрываем Mini App
    });

    // Предупреждение, если открыт не из Telegram
    if (!tg.initData || tg.initData === "") {
      alert("⚠️ Открой это приложение через Telegram-бота, а не через браузер!");
    }
  </script>
</body>
</html>
